name: Supabase migrations

# Forward-only migrations workflow. Al push su main che tocca supabase/migrations/**
# applica le migrazioni al progetto cloud con `supabase db push`.
# Richiede i secret repo: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref rmlobxjlqlpixkvrzmfg

      - name: Push migrations
        run: supabase db push
