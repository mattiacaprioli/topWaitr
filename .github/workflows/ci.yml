name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      # Blocking: ESLint is configured (eslint.config.js + eslint-config-expo).
      # Fails on errors; advisory warnings (e.g. RHF watch) don't block.
      - name: Lint
        run: npx expo lint
