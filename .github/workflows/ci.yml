name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint runs once ESLint is configured (eslint-config-expo). Non-blocking
      # until then so CI doesn't fail on a missing config.
      - name: Lint
        run: npx expo lint
        continue-on-error: true
